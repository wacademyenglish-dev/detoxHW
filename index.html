<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Homework App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#09090B', panelDark: '#18181B', panelHover: '#27272A', textLight: '#F8FAFC', textMuted: '#A1A1AA', accentGreen: '#10B981', accentPink: '#EC4899' },
                    fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        #phone-frame { width: 375px; height: 812px; background: #09090B; border-radius: 40px; border: 12px solid #111; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(16,185,129,0.15); }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #111; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .confetti { position: absolute; width: 8px; height: 8px; background-color: #10B981; opacity: 0; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(800px) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="phone-frame">
        <div class="notch"></div>
        
        <!-- UI Header -->
        <header class="pt-12 pb-4 px-6 bg-panelDark border-b border-panelHover flex justify-between items-center z-40 relative">
            <div class="font-heading font-bold text-accentGreen text-sm tracking-widest">WOLF<span class="text-textLight">HW</span></div>
            <div class="text-xs font-mono text-textMuted" id="q-counter">Q 1/15</div>
        </header>

        <!-- Progress Bar -->
        <div class="h-1 bg-bgDark w-full">
            <div id="progress-bar" class="h-full bg-accentGreen transition-all duration-300 shadow-[0_0_8px_rgba(16,185,129,0.5)]" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <main id="app-content" class="p-6 h-[calc(100%-100px)] overflow-y-auto relative text-textLight">
            <!-- Start Screen -->
            <div id="screen-start" class="flex flex-col items-center justify-center h-full text-center fade-in">
                <i class="fa-solid fa-power-off text-7xl text-accentGreen mb-6" style="text-shadow: 0 0 20px rgba(16,185,129,0.5);"></i>
                <h1 class="font-heading text-3xl font-black mb-2 uppercase tracking-widest">Digital Detox</h1>
                <p class="text-textMuted mb-10 text-sm">Homework Module B1<br>Quantifiers & Phrasal Verbs</p>
                <button onclick="startQuiz()" class="bg-accentGreen/20 text-accentGreen border border-accentGreen w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase text-lg shadow-lg hover:bg-accentGreen hover:text-bgDark transition-colors">START DETOX</button>
            </div>

            <!-- Quiz Screen -->
            <div id="screen-quiz" class="hidden flex-col h-full fade-in">
                <div class="flex-1 flex flex-col justify-center">
                    <p id="question-text" class="font-body text-2xl font-bold mb-8 text-center leading-snug"></p>
                    <div id="options-container" class="flex flex-col gap-4">
                        <!-- Options injected here -->
                    </div>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="screen-result" class="hidden flex-col items-center justify-center h-full text-center fade-in z-10 relative">
                <div id="rank-icon" class="text-7xl mb-4 text-accentGreen" style="text-shadow: 0 0 20px rgba(16,185,129,0.4);"></div>
                <h2 class="font-heading text-5xl font-black mb-2 text-textLight" id="final-score"></h2>
                <p class="text-textMuted font-mono mb-8 uppercase tracking-widest text-sm" id="rank-title"></p>
                <div class="bg-panelDark p-5 rounded-2xl w-full border border-panelHover mb-8 shadow-inner">
                    <p class="text-sm text-textLight leading-relaxed">Clinic Note:<br>Use <span class="text-accentGreen font-bold">TOO MUCH</span> for uncountable.<br>Use <span class="text-accentPink font-bold">TOO MANY</span> for countable.</p>
                </div>
                <button onclick="location.reload()" class="bg-panelHover border border-textMuted text-textMuted w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase">REBOOT SYSTEM</button>
            </div>
        </main>
    </div>

    <script>
        const questions = [
            { q: "I have _____ apps on my phone.", o: ["too much", "too many", "not enough"], a: 1 },
            { q: "He spends _____ time scrolling through TikTok.", o: ["too much", "too many", "enough"], a: 0 },
            { q: "You look tired. You are getting _____ sleep.", o: ["too much", "too many", "not enough"], a: 2 },
            { q: "I need to log _____ and go outside.", o: ["out", "off", "down"], a: 1 },
            { q: "I receive _____ notifications every day.", o: ["too much", "too many", "not enough"], a: 1 },
            { q: "She wants to cut _____ on caffeine.", o: ["down in", "off on", "down on"], a: 2 },
            { q: "I am afraid of missing _____ on the party.", o: ["off", "out", "down"], a: 1 },
            { q: "There is _____ information on the internet. It's stressful.", o: ["too much", "too many", "not enough"], a: 0 },
            { q: "I don't have _____ time to finish this project.", o: ["too much", "too many", "enough"], a: 2 },
            { q: "Stop _____ through your feed and talk to me!", o: ["logging", "scrolling", "missing"], a: 1 },
            { q: "He drank _____ cups of coffee this morning.", o: ["too much", "too many", "enough"], a: 1 },
            { q: "We are spending _____ money on video games.", o: ["too much", "too many", "not enough"], a: 0 },
            { q: "If you don't go, you will _____ out on all the fun.", o: ["scroll", "cut", "miss"], a: 2 },
            { q: "I feel sick. I ate _____ slices of pizza.", o: ["too much", "too many", "enough"], a: 1 },
            { q: "You need to cut down _____ your screen time.", o: ["on", "in", "off"], a: 0 }
        ];

        let currentQ = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('screen-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQ) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-panelDark border border-panelHover text-left p-5 rounded-xl text-lg hover:border-accentGreen transition-colors';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx, q.a, btn, optsContainer);
                optsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn, container) {
            Array.from(container.children).forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('bg-accentGreen', 'border-accentGreen', 'text-bgDark', 'font-bold');
                score++;
            } else {
                btn.classList.add('bg-accentPink', 'border-accentPink', 'text-textLight');
                container.children[correct].classList.add('border-accentGreen', 'text-accentGreen');
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    document.getElementById('screen-quiz').classList.remove('fade-in');
                    void document.getElementById('screen-quiz').offsetWidth; 
                    document.getElementById('screen-quiz').classList.add('fade-in');
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('screen-result').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '100%';
            
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let rank, icon;
            if (score === 15) { rank = 'DIGITAL THERAPIST'; icon = '<i class="fa-solid fa-leaf"></i>'; spawnConfetti(); }
            else if (score >= 10) { rank = 'MINDFUL USER'; icon = '<i class="fa-solid fa-mobile-screen text-accentGreen"></i>'; }
            else { rank = 'DOOM SCROLLER'; icon = '<i class="fa-solid fa-battery-empty text-textMuted"></i>'; }
            
            document.getElementById('rank-title').innerText = rank;
            document.getElementById('rank-icon').innerHTML = icon;
        }

        function spawnConfetti() {
            const container = document.getElementById('screen-result');
            const colors = ['#10B981', '#EC4899', '#F8FAFC'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                conf.style.animationDelay = Math.random() * 2 + 's';
                conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
